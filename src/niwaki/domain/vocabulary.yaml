  vzTaboo:
    subject: vzTSubj

  # ── Out-of-band contract (management tenant) ────────────────────────────────
  vzOOBBrCP:
    subject: vzSubj
    exception: vzException

  # ── vzAny — one place to hang contracts for the whole VRF ───────────────────
  vzAny:
    provider_label: vzProvLbl
    consumer_label: vzConsLbl
    provider_subject_label: vzProvSubjLbl
    consumer_subject_label: vzConsSubjLbl
