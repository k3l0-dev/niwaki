    ospf_route_summarization_policy: ospfRtSummPol
    route_control_profile: rtctrlProfile
  l3extVirtualLIfP:
    domain: infraDomP        # abstract — phys_dom / vmm_dom / l3_dom / ...
  bgpPeerP:
    bgp_peer_prefix_policy: bgpPeerPfxPol
    route_control_profile: rtctrlProfile
  bgpInfraPeerP:
    bgp_peer_prefix_policy: bgpPeerPfxPol
  bgpProtP:
    bgp_best_path_control_policy: bgpBestPathCtrlPol
    bgp_timers_policy: bgpCtxPol
  bfdIfP:
    bfd_interface_policy: bfdIfPol
  bfdMhIfP:
    bfd_interface_policy: bfdMhIfPol
  bfdMhNodeP:
    bfd_multihop_node_policy: bfdMhNodePol
  dhcpLbl:
    dhcp_option_policy: dhcpOptionPol
  eigrpAuthIfP:
    keychain_policy: fvKeyChainPol
  eigrpIfP:
    eigrp_interface_policy: eigrpIfPol
  hsrpGroupP:
    hsrp_group_policy: hsrpGroupPol
  hsrpIfP:
    hsrp_interface_policy: hsrpIfPol
  igmpIfP:
    igmp_interface_policy: igmpIfPol
  l3extBdProfileCont:
    bd_profile: l3extBdProfile
  mplsExtP:
    mpls_global_configuration: mplsLabelPol
  mplsIfP:
    mpls_interface_policy: mplsIfPol
  ndPfxP:
    nd_ra_prefix_policy: ndPfxPol
  ospfIfP:
    ospf_interface_policy: ospfIfPol
  pimIfP:
    pim_interface_policy: pimIfPol
  pimIPV6IfP:
    pim_interface_policy: pimIfPol
  rtctrlCtxP:
    match_rule: rtctrlSubjP
  rtctrlScope:
    action_rule_profile: rtctrlAttrP

  # ── Tenant protocol policies (wave 1bis) ────────────────────────────────────
  fvTrackList:
    track_member: fvTrackMember
  fvTrackMember:
    ip_sla_monitoring_policy: fvIPSLAMonitoringPol
  vnsRedirectDest:
    l4_l7_redirect_health_group: vnsRedirectHealthGroup
  vnsSvcRedirectPol:
    ip_sla_monitoring_policy: fvIPSLAMonitoringPol
    pbr_backup_policy: vnsBackupPol

  # ── Access policies ─────────────────────────────────────────────────────────
  infraAttEntityP:
    domain: infraADomP       # abstract — phys_dom / vmm_dom / l3_dom / ...
  physDomP:
    vlan_pool: fvnsVlanInstP
  l3extDomP:
    vlan_pool: fvnsVlanInstP
  l2extDomP:
    vlan_pool: fvnsVlanInstP
  infraAccPortGrp:
    aaep: infraAttEntityP
    cdp: cdpIfPol
