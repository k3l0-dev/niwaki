  vzFilter:
    entry: vzEntry
    port_zero_entry: vzEntryPortZero   # wave 2026-07-15

  vzBrCP:
    subject: vzSubj
    exception: vzException         # EPGs excluded from this contract

  vzSubj:
    # Directional filters — used when the subject stops applying both ways.
    in_term: vzInTerm
    out_term: vzOutTerm
    exception: vzException
    provider_subject_label: vzProvSubjLbl
    consumer_subject_label: vzConsSubjLbl

  # ── Taboo contract ──────────────────────────────────────────────────────────
