# Niwaki vocabulary — the single curated naming source for the SDK.
#
# `tests/design/test_core_yaml.py` validates every entry against CHILD_MAP /
# BIND_MAP / _contains so the curation cannot drift from the generated schema.
#
# Sections:
#   jargon: ACI class → short name.  Feeds CHILD_MAP (read navigation);
#           classes not listed fall back to snake_case(label) automatically.
#   makers: parent ACI class → {maker name → child ACI class}.  The curated
#           design surface; the "polUni" table defines the design roots.
#           Structure is literal: one maker per real APIC child class.
#   binds:  cursor ACI class → {bind alias → target ACI class} (the Rs class
#           is resolved at push time via BIND_MAP, direct then inverse).
#   verbs:  cursor ACI class → {verb → {rs, target}}.  A verb names its Rs
#           class upfront, which is what lets it reach a target automatic
#           resolution cannot: two relations to the same class (provide vs
#           consume, ingress vs egress policing).  The parameter is named
#           after the target's jargon (provide(contract), ingress_dpp(dpp_policy)).
#   sugar:  extra typed maker/set parameters handled by design._sugar.
#   atomic: classes whose subtree must ship in one POST in staged mode
#           (the APIC validates them as a unit).

jargon:
  # ── Root (polUni / uni) ─────────────────────────────────────────────────────
  fvTenant: tenant
  physDomP: phys_dom
  l2extDomP: l2_dom
  l3extDomP: l3_dom
  vmmDomP: vmm_dom
  infraInfra: infra
  fabricInst: fabric

  # ── infra children ──────────────────────────────────────────────────────────
  fvnsVlanInstP: vlan_pool
  fvnsVxlanInstP: vxlan_pool
  infraAttEntityP: aaep
  infraNodeP: leaf_profile
  infraSpineP: spine_profile
  infraAccPortP: access_port_profile
  infraSpineAccPortP: spine_access_port_profile
  infraAccBndlGrp: port_channel
  infraAccBndlPolGrp: port_channel_override
  infraFuncP: func_profile
  infraPortP: port_profile
  cdpIfPol: cdp_policy
  lacpLagPol: lacp_policy
  lldpIfPol: lldp_policy
  mcpIfPol: mcp_policy
  stpIfPol: stp_policy
  monInfraPol: monitoring_policy

  # ── Tenant ──────────────────────────────────────────────────────────────────
  fvCtx: vrf
  fvBD: bd
  fvAp: app
  vzBrCP: contract
  vzOOBBrCP: oob_contract
  vzFilter: filter
  l3extOut: l3out
  l2extOut: l2out
  l2extInstP: external_epg
  fvEpRetPol: ep_retention_policy
  fvEpIpAgingP: ep_aging_policy
  fvEndpointSecGrp: esg_policy
  netflowMonitorPol: netflow_monitor
  qosDppPol: dpp_policy
  igmpSnoopPol: igmp_snoop_policy
  monEPGPol: monitoring_policy

  # ── VRF ─────────────────────────────────────────────────────────────────────
  vzAny: vzany
  pimCtxP: pim_ctx
  fvRsBgpCtxPol: bgp_ctx_policy
  fvRsOspfCtxPol: ospf_ctx_policy

  # ── BD ──────────────────────────────────────────────────────────────────────
  fvSubnet: subnet
  fvRsCtx: vrf_binding
  fvRsBDToOut: l3out_binding
  igmpSnoopP: igmp_snoop
  pimBDP: pim

  # ── App profile ─────────────────────────────────────────────────────────────
  fvAEPg: epg
  fvESg: esg

  # ── EPG / ESG ───────────────────────────────────────────────────────────────
  fvRsBd: bd_binding
  fvRsDomAtt: domain
  fvEPSelector: ep_selector
  fvEPgSelector: epg_selector
  fvTagSelector: tag_selector
  fvRsProv: contract_provider
  fvRsCons: contract_consumer
  fvRsConsIf: contract_if_consumer
  fvRsProtBy: taboo
  fvRsIntraEpg: intra_epg_contract
  fvRsPathAtt: static_path
  fvRsNodeAtt: static_node
  fvRsFcPathAtt: fc_path       # schema label would give "Fv Static Path"
  tagAnnotation: annotation
  tagTag: tag
  fvCEp: endpoint
  fvStCEp: static_endpoint
  fvStIp: static_ip
  fvVip: virtual_ip

  # ── uSeg EPG (criterion) ────────────────────────────────────────────────────
  fvCrtrn: criterion
  fvSCrtrn: sub_criterion
  fvIpAttr: ip_attribute
  fvMacAttr: mac_attribute
  fvVmAttr: vm_attribute
  fvDnsAttr: dns_attribute

  # ── Contract ────────────────────────────────────────────────────────────────
  vzSubj: subject
  vzRsSubjGraphAtt: service_graph
  vzTaboo: taboo_contract
  vzCPIf: imported_contract
  vzTSubj: subject             # taboo subject — sibling of nothing else named "subject"
  vzRsDenyRule: deny_rule
  vzException: exception

  # ── Contract labels (EPG / ESG / vzAny / subject) ────────────────────────────
  vzProvLbl: provider_label
  vzConsLbl: consumer_label
  vzProvSubjLbl: provider_subject_label
  vzConsSubjLbl: consumer_subject_label
  vzProvCtrctLbl: provider_contract_label
  vzConsCtrctLbl: consumer_contract_label

  # ── Subject ─────────────────────────────────────────────────────────────────
  vzRsSubjFiltAtt: filter_binding
  vzInTerm: in_term
  vzOutTerm: out_term

  # ── Filter ──────────────────────────────────────────────────────────────────
  vzEntry: entry

  # ── Troubleshooting (SPAN) ──────────────────────────────────────────────────
  spanSpanLbl: span_label      # schema label: "Span Source Destination Group Match Label"

  # ── NetFlow ─────────────────────────────────────────────────────────────────
  netflowExporterPol: netflow_exporter
  netflowRecordPol: netflow_record

  # ── QoS ─────────────────────────────────────────────────────────────────────
  qosRequirement: qos_requirement
  qosDscpTransPol: dscp_translation_policy
  qosEpDscpMarking: dscp_marking
  qosMplsIngressRule: mpls_ingress_rule
  qosMplsEgressRule: mpls_egress_rule

  # ── Management (in-band / out-of-band) ──────────────────────────────────────
  mgmtInB: in_band_epg
  mgmtOoB: out_of_band_epg
  mgmtExtMgmtEntity: external_management_entity
  mgmtInstP: external_management_epg
  mgmtStaticRoute: static_route

  # ── Endpoint tags (what an ESG tag selector matches) ────────────────────────
  fvEpTags: endpoint_tags

  # ── Fallback route group (VRF) ──────────────────────────────────────────────
  fvFBRGroup: fallback_route_group
  fvFBRMember: fallback_member

  # ── Access EPGs (infra) ─────────────────────────────────────────────────────
  infraClP: access_client_profile
  infraProvP: access_function_profile

  # ── L2Out ───────────────────────────────────────────────────────────────────
  l2extLNodeP: node_profile
  l2extLIfP: interface_profile
  l2extRsPathL2OutAtt: static_path   # schema label says "Leaf Port"

  # ── L3Out ───────────────────────────────────────────────────────────────────
  l3extLNodeP: node_profile
  l3extInstP: external_epg
  l3extRsEctx: vrf_binding
  ospfExtP: ospf
  bgpExtP: bgp
  eigrpExtP: eigrp

  # ── L3Out Node profile ──────────────────────────────────────────────────────
  l3extLIfP: interface_profile
  l3extRsNodeL3OutAtt: node_attachment
  bfdMhNodeP: bfd_multihop_node_profile  # schema label "Node Profile" would shadow l3extLNodeP

  # ── L3Out Interface profile ─────────────────────────────────────────────────
  l3extRsPathL3OutAtt: path_attachment
  bgpPeerP: bgp_peer
  ospfIfP: ospf_interface
  l3extVirtualLIfP: floating_svi         # schema label "Logical Interface Profile" is l3extLIfP's
  mplsIfP: mpls_interface                # schema label says "Interface Config"
  eigrpAuthIfP: eigrp_authentication     # schema label says "Keychainpol Holder Mo"
  l3extBdProfileCont: bd_profile_container  # schema label typo: "Conntainer Of Rspath …"

  # ── Leaf profile ────────────────────────────────────────────────────────────
  infraLeafS: leaf_selector
  infraNodeBlk: node_block

  # ── Access port profile ─────────────────────────────────────────────────────
  infraHPortS: port_selector
  infraSHPortS: sub_port_selector
  infraPortBlk: port_block
  infraSubPortBlk: sub_port_block

  # ── AAEP ────────────────────────────────────────────────────────────────────
  infraRsDomP: domain_binding

makers:
  # ── Design roots (children of polUni) ───────────────────────────────────────
  polUni:
    tenant: fvTenant
    infra: infraInfra
    fabric: fabricInst
    controller: ctrlrInst
    phys_dom: physDomP
    l3_dom: l3extDomP
    l2_dom: l2extDomP     # the domain an L2Out attaches to

  # ══ Tenant world ═══════════════════════════════════════════════════════════
  # Ordered like the APIC GUI tree under Tenants > <tenant>, so a new maker
  # goes where an operator would look for it — not at the end of the list.
  fvTenant:
    # ── Application Profiles ──────────────────────────────────────────────────
    app: fvAp

    # ── Networking ────────────────────────────────────────────────────────────
    bd: fvBD
    vrf: fvCtx
    l3out: l3extOut
    l2out: l2extOut
    dot1q_tunnel: fvTnlEPg
    endpoint_tags: fvEpTags     # the tags an ESG tag_selector matches
    ip_address_pool: fvnsAddrInst

    # ── Contracts ─────────────────────────────────────────────────────────────
    filter: vzFilter
    contract: vzBrCP
    taboo_contract: vzTaboo
    imported_contract: vzCPIf
    oob_contract: vzOOBBrCP     # out-of-band (management tenant)

    # ── Policies › Protocol › BGP ─────────────────────────────────────────────
    bgp_timers_policy: bgpCtxPol
    bgp_address_family_context_policy: bgpCtxAfPol
    bgp_best_path_control_policy: bgpBestPathCtrlPol
    bgp_peer_prefix_policy: bgpPeerPfxPol
    bgp_route_summarization_policy: bgpRtSummPol

    # ── Policies › Protocol › OSPF ────────────────────────────────────────────
    ospf_interface_policy: ospfIfPol
    ospf_timers_policy: ospfCtxPol
    ospf_route_summarization_policy: ospfRtSummPol

    # ── Policies › Protocol › EIGRP ───────────────────────────────────────────
    eigrp_interface_policy: eigrpIfPol
    eigrp_address_family_context_policy: eigrpCtxAfPol
    eigrp_route_summarization_policy: eigrpRtSummPol

    # ── Policies › Protocol › HSRP ────────────────────────────────────────────
    hsrp_interface_policy: hsrpIfPol
    hsrp_group_policy: hsrpGroupPol

    # ── Policies › Protocol › BFD ─────────────────────────────────────────────
    bfd_interface_policy: bfdIfPol
    bfd_mh_interface_policy: bfdMhIfPol
    bfd_multihop_node_policy: bfdMhNodePol

    # ── Policies › Protocol › Multicast (IGMP, MLD, PIM) ──────────────────────
    igmp_interface_policy: igmpIfPol
    igmp_snoop_policy: igmpSnoopPol
    mld_snoop_policy: mldSnoopPol
    pim_interface_policy: pimIfPol
    pim_route_map_policy: pimRouteMapPol

    # ── Policies › Protocol › ND / ARP ────────────────────────────────────────
    nd_interface_policy: ndIfPol
    nd_ra_prefix_policy: ndPfxPol
    arp_interface_policy: arpIfPol

    # ── Policies › Protocol › DHCP ────────────────────────────────────────────
    dhcp_relay_policy: dhcpRelayP
    dhcp_option_policy: dhcpOptionPol

    # ── Policies › Protocol › First Hop Security ──────────────────────────────
    fhs_bd_policy: fhsBDPol
    trust_control_policy: fhsTrustCtrlPol

    # ── Policies › Protocol › Route control ───────────────────────────────────
    route_control_profile: rtctrlProfile
    match_rule: rtctrlSubjP
    action_rule_profile: rtctrlAttrP
    route_tag_policy: l3extRouteTagPol
    rogue_exception_mac_group: l3extRogueExceptionMacGroup   # wave 2026-07-15
    vrf_validation_policy: l3extVrfValidationPol

    # ── Policies › Security & VPN (wave: 2026-07-15) ──────────────────────────
    host_protection: hostprotPol       # host protection (microseg) domain
    isakmp_global: isakmpGlobalPol
    isakmp_keyring: isakmpKeyring
    isakmp_policy: isakmpPolicy
    isakmp_profile: isakmpProfile
    ipsec_phase1: ipsecIsakmpPhase1Pol
    ipsec_phase2: ipsecIsakmpPhase2Pol

    # ── Policies › Protocol (wave: 2026-07-15) ────────────────────────────────
    dns_server_group: dnsepgSvrGrp
    auth_server_group: authSvrGroup
    fc_pinning: fcPinningP              # Fibre Channel uplink pinning
    address_pool: fvAddrMgmtPool        # IP address management pool

    # ── Policies › Protocol › IP SLA & tracking ───────────────────────────────
    ip_sla_monitoring_policy: fvIPSLAMonitoringPol
    track_list: fvTrackList
    track_member: fvTrackMember

    # ── Policies › Protocol › MPLS ────────────────────────────────────────────
    mpls_interface_policy: mplsIfPol
    mpls_global_configuration: mplsLabelPol

    # ── Policies › Protocol › misc ────────────────────────────────────────────
    ep_retention_policy: fvEpRetPol
    external_bridge_group_profile: l3extBdProfile
    tenant_keychain_policy: fvKeyChainPol

    # ── Policies › QoS ────────────────────────────────────────────────────────
    custom_qos_policy: qosCustomPol
    dpp_policy: qosDppPol
    qos_requirement: qosRequirement
    mpls_custom_qos_policy: qosMplsCustomPol
    dscp_translation_policy: qosDscpTransPol

    # ── Policies › NetFlow ────────────────────────────────────────────────────
    netflow_monitor: netflowMonitorPol
    netflow_exporter: netflowExporterPol
    netflow_record: netflowRecordPol

    # ── Policies › Troubleshooting (SPAN) ─────────────────────────────────────
    span_source_group: spanSrcGrp
    span_destination_group: spanDestGrp

    # ── Policies › Monitoring ─────────────────────────────────────────────────
    monitoring_policy: monEPGPol

    # ── Managed Node Connectivity Groups (in-band / out-of-band) ──────────────
    management_profile: mgmtMgmtP
    external_management_entity: mgmtExtMgmtEntity

    # ── Access EPGs (an L3Out external EPG may inherit contracts from them) ───
    access_client_profile: infraClP
    access_function_profile: infraProvP

    # ── Services (L4-L7 policies, no service graph) ────────────────────────────
    service_container: vnsSvcCont

  # ══ Application profile ════════════════════════════════════════════════════
  fvAp:
    epg: fvAEPg
    esg: fvESg

  # ══ EPG (wave 2, 2026-07-14) ═══════════════════════════════════════════════
  # Ordered like Tenants > <tenant> > Application Profiles > <ap> > Application
  # EPGs > <epg> in the GUI.
  fvAEPg:
    # ── Domains › Static ports / Static leafs / Fibre Channel ─────────────────
    static_path: fvRsPathAtt
    fc_path: fvRsFcPathAtt

    # ── Subnets ───────────────────────────────────────────────────────────────
    subnet: fvSubnet

    # ── Static endpoints ──────────────────────────────────────────────────────
    static_endpoint: fvStCEp

    # ── uSeg attributes (the EPG is a uSeg EPG when it carries a criterion) ───
    criterion: fvCrtrn

    # ── Contracts › labels (matched against the contract's own labels) ────────
    provider_label: vzProvLbl
    consumer_label: vzConsLbl
    provider_subject_label: vzProvSubjLbl
    consumer_subject_label: vzConsSubjLbl
    provider_contract_label: vzProvCtrctLbl
    consumer_contract_label: vzConsCtrctLbl

    # ── L4-L7 virtual IPs ─────────────────────────────────────────────────────
    virtual_ip: fvVip

  fvStCEp:
    static_ip: fvStIp

  fvCrtrn:
    sub_criterion: fvSCrtrn
    ip_attribute: fvIpAttr
    mac_attribute: fvMacAttr
    vm_attribute: fvVmAttr
    dns_attribute: fvDnsAttr
    identity_group: fvIdGroupAttr   # wave 2026-07-15
    useg_bd: fvUsegBDCont

  fvSCrtrn:
    # The MIT hangs IP and MAC attributes here as well; the APIC rejects both
    # ("cannot be configured under a Sub-Criteria") — VM attributes only.
    vm_attribute: fvVmAttr

  # ══ ESG (endpoint security group) ══════════════════════════════════════════
  fvESg:
    # ── Selectors ─────────────────────────────────────────────────────────────
    ep_selector: fvEPSelector      # tag / IP match expression
    epg_selector: fvEPgSelector    # whole EPG
    tag_selector: fvTagSelector    # policy tag (key/value)
    lif_ctx_selector: fvLIfCtxSelector   # LIfCtx selector (wave 2026-07-15)

    # ── Contracts › labels ────────────────────────────────────────────────────
    provider_label: vzProvLbl
    consumer_label: vzConsLbl
    provider_subject_label: vzProvSubjLbl
    consumer_subject_label: vzConsSubjLbl
    provider_contract_label: vzProvCtrctLbl
    consumer_contract_label: vzConsCtrctLbl

  fvBD:
    subnet: fvSubnet
    pim: pimBDP                    # BD-level PIM (multicast)
    nd_ra_subnet: ndRaSubnet       # ND proxy / RA subnet
    legacy_mode: fvAccP            # BD access profile / legacy mode (wave 2026-07-15)
    rogue_exception_mac: fvRogueExceptionMac

  # ══ VRF ════════════════════════════════════════════════════════════════════
  fvCtx:
    pim: pimCtxP                   # VRF-level PIM (IPv4)
    pim6: pimIPV6CtxP              # VRF-level PIM (IPv6) — Cisco jargon 'pim6'
    igmp: igmpCtxP                 # VRF-level IGMP
    leak_routes: leakRoutes        # inter-VRF route leaking
    global_vrf_name: l3extGlobalCtxName
    snmp_context: snmpCtxP         # VRF SNMP context
    dns_label: dnsLbl
    route_summarization: fvCtxRtSummPol   # VRF route summarization (wave 2026-07-15)
    route_deployment: fvRouteDeployP
    vzany: vzAny                   # the VRF-wide EPG collection
    fallback_route_group: fvFBRGroup

  fvFBRGroup:
    fallback_route: fvFBRoute
    fallback_member: fvFBRMember

  # ══ Multicast — PIM / IGMP / MLD (wave: 2026-07-15) ════════════════════════
  # VRF PIM hub (.pim / .pim6 on the VRF): the RP, pattern and filter policies.
  pimCtxP:
    asm_pattern: pimASMPatPol
    ssm_pattern: pimSSMPatPol
    auto_rp: pimAutoRPPol
    bootstrap_rp: pimBSRPPol
    fabric_rp: pimFabricRPPol
    static_rp: pimStaticRPPol
    stripe_winner: pimCSWPol
    inter_vrf: pimInterVRFPol
    resource: pimResPol
  pimIPV6CtxP:                     # IPv6 VRF PIM — same policies minus stripe_winner
    asm_pattern: pimASMPatPol
    ssm_pattern: pimSSMPatPol
    auto_rp: pimAutoRPPol
    bootstrap_rp: pimBSRPPol
    fabric_rp: pimFabricRPPol
    static_rp: pimStaticRPPol
    inter_vrf: pimInterVRFPol
    resource: pimResPol
  pimASMPatPol:
    register_traffic: pimRegTrPol
    sg_expiry: pimSGRangeExpPol
    shared_range: pimSharedRangePol
  pimSSMPatPol:
    ssm_range: pimSSMRangePol
  pimAutoRPPol:
    ma_filter: pimMAFilterPol      # mapping-agent filter
  pimBSRPPol:
    bsr_filter: pimBSRFilterPol
  pimFabricRPPol:
    rp_entry: pimStaticRPEntryPol
  pimStaticRPPol:
    rp_entry: pimStaticRPEntryPol
  pimStaticRPEntryPol:
    group_range: pimRPGrpRangePol
  pimCSWPol:
    entry: pimCSWEntry
  pimInterVRFPol:
    entry: pimInterVRFEntryPol
  # BD PIM hub (.pim on the BD)
  pimBDP:
    filter: pimBDFilterPol
  pimBDFilterPol:
    source_filter: pimBDSrcFilterPol
    destination_filter: pimBDDestFilterPol
  # PIM interface policy (tenant-level .pim_interface_policy)
  pimIfPol:
    neighbor_filter: pimNbrFilterPol
    inbound_jp_filter: pimJPInbFilterPol       # inbound join/prune filter
    outbound_jp_filter: pimJPOutbFilterPol     # outbound join/prune filter
  # VRF IGMP hub (.igmp on the VRF)
  igmpCtxP:
    ssm_translate: igmpSSMXlateP
  # IGMP interface policy (tenant-level .igmp_interface_policy)
  igmpIfPol:
    report: igmpRepPol
    state_limit: igmpStateLPol
    static_report: igmpStRepPol
  # IGMP/MLD snooping groups + port security on a static path (.static_path)
  fvRsPathAtt:
    igmp_snoop_access_group: igmpSnoopAccessGroup
    igmp_snoop_static_group: igmpSnoopStaticGroup
    mld_snoop_access_group: mldSnoopAccessGroup
    mld_snoop_static_group: mldSnoopStaticGroup
    port_security: l2PortSecurityPol       # wave 2026-07-15
    ptp: ptpEpgCfg                         # PTP on the path (wave 2026-07-15)
    nlb_static_group: fvNlbStaticGroup     # NLB static group

  # ══ Route-control & leaking (wave: 2026-07-15) ════════════════════════════
  # Route-map match terms (on a match_rule, rtctrlSubjP) — Cisco 'match' clauses.
  rtctrlSubjP:
    match_prefix: rtctrlMatchRtDest
    match_community: rtctrlMatchCommTerm
    match_community_regex: rtctrlMatchCommRegexTerm
    match_as_path: rtctrlMatchAsPathRegexTerm
  rtctrlMatchCommTerm:
    factor: rtctrlMatchCommFactor
  # Route-map set rules (on an action_rule_profile, rtctrlAttrP) — Cisco 'set'.
  rtctrlAttrP:
    set_as_path: rtctrlSetASPath
    add_community: rtctrlSetAddComm
    set_community: rtctrlSetComm
    set_dampening: rtctrlSetDamp
    set_next_hop: rtctrlSetNh
    set_next_hop_unchanged: rtctrlSetNhUnchanged
    set_policy_tag: rtctrlSetPolicyTag
    set_preference: rtctrlSetPref
    set_redistribute_multipath: rtctrlSetRedistMultipath
    set_metric: rtctrlSetRtMetric
    set_metric_type: rtctrlSetRtMetricType
    set_route_tag: rtctrlSetTag
    set_weight: rtctrlSetWeight
  rtctrlSetASPath:
    asn: rtctrlSetASPathASN
  # Inter-VRF route leaking (leak_routes on the VRF)
  leakRoutes:
    external_prefix: leakExternalPrefix
    internal_prefix: leakInternalPrefix
    internal_subnet: leakInternalSubnet
  leakExternalPrefix:
    leak_to: leakTo                # destination tenant + VRF
  leakInternalPrefix:
    leak_to: leakTo
  leakInternalSubnet:
    leak_to: leakTo
  # Static routes (on an L3Out node attachment)
  l3extRsNodeL3OutAtt:
    static_route: ipRouteP
    infra_node: l3extInfraNodeP      # infra logical node profile (GOLF)
    loopback: l3extLoopBackIfP       # node loopback (OSPF/BGP router-id)
  ipRouteP:
    next_hop: ipNexthopP

  # ══ Host protection — microseg security domain (wave: 2026-07-15) ══════════
  hostprotPol:
    subject: hostprotSubj
    remote_ips: hostprotRemoteIpContainer
  hostprotSubj:
    rule: hostprotRule
  hostprotRule:
    remote_ip: hostprotRemoteIp
    filter: hostprotFilterContainer
  hostprotRemoteIpContainer:
    remote_ip: hostprotRemoteIp
  hostprotRemoteIp:
    ep_label: hostprotEpLabel
  hostprotFilterContainer:
    pod_filter: hostprotPodFilter

  # ══ L3Out remainder (wave: 2026-07-15) ════════════════════════════════════
  l3extRsPathL3OutAtt:
    forwarder_address: l3extForwarderAddr    # anycast forwarding IP on the path
    rogue_exception_mac: l3extRogueExceptMacP
    micro_bfd: bfdMicroBfdP                   # wave 2026-07-15
    ptp_l3out: ptpRtdEpgCfg
  l3extRogueExceptionMacGroup:
    mac: l3extRogueExceptionMac

  # ══ Protocol policies (wave: 2026-07-15) ══════════════════════════════════
  qosCustomPol:
    dot1p_class: qosDot1PClass
    dscp_class: qosDscpClass
  fvRsFcPathAtt:
    pinning_label: fcPinningLbl
  l3extLoopBackIfP:
