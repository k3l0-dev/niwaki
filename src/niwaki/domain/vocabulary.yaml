binds:
  # ── Multicast filters reference a PIM route-map (wave: 2026-07-15) ───────────
  # Each PIM/IGMP filter policy points at the pimRouteMapPol that defines what it
  # permits/denies.  The abstract rtdmcARtMapPol edge is the same relation and is
  # omitted in favour of the concrete class.
  igmpRepPol:
    pim_route_map_policy: pimRouteMapPol
  igmpStRepPol:
    pim_route_map_policy: pimRouteMapPol
  igmpStateLPol:
    pim_route_map_policy: pimRouteMapPol
  pimRegTrPol:
    pim_route_map_policy: pimRouteMapPol
  pimSGRangeExpPol:
    pim_route_map_policy: pimRouteMapPol
  pimSharedRangePol:
    pim_route_map_policy: pimRouteMapPol
  pimSSMRangePol:
    pim_route_map_policy: pimRouteMapPol
  pimResPol:
    pim_route_map_policy: pimRouteMapPol
  pimMAFilterPol:
    pim_route_map_policy: pimRouteMapPol
  pimBSRFilterPol:
    pim_route_map_policy: pimRouteMapPol
