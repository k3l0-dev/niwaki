  # ── Access policies (uni/infra) ─────────────────────────────────────────────
  # ══ Access policies ════════════════════════════════════════════════════════
  # Ordered like Fabric > Access Policies in the GUI.
  infraInfra:
    # ── Policies › Interface ──────────────────────────────────────────────────
    cdp_policy: cdpIfPol
    lldp_policy: lldpIfPol
    lacp_policy: lacpLagPol
    link_level_policy: fabricHIfPol
    mcp_policy: mcpIfPol
