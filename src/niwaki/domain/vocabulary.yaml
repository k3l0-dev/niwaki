  # ── Tenant world ────────────────────────────────────────────────────────────
  fvAEPg:
    bd: fvBD
    domain: infraDomP        # abstract — phys_dom / vmm_dom / l3_dom / ...
    contract_master: fvEPg   # abstract — inherit contracts from another EPG/ESG
    imported_contract: vzCPIf
    taboo_contract: vzTaboo
    custom_qos_policy: qosCustomPol
    dpp_policy: qosDppPol
    monitoring_policy: monEPGPol
    trust_control_policy: fhsTrustCtrlPol
    qos_requirement: qosRequirement
  fvESg:
    vrf: fvCtx               # mandatory — an ESG lives in a VRF
    contract_master: fvEPg   # abstract
    imported_contract: vzCPIf
    custom_qos_policy: qosCustomPol
    # No taboo_contract: the MIT hangs fvRsProtBy here, the APIC answers
    # "Taboo contracts are not supported by fvESg".
  fvSubnet:
    l3out: l3extOut
    nd_ra_prefix_policy: ndPfxPol
  fvStCEp:
    path: fabricAPathEp      # fabric-discovered — reach it with bind_dn(path=...)
    fabric_node: fabricNode
  vzTSubj:
    filter: vzFilter
  vzCPIf:
    contract: vzBrCP         # the exported contract this interface points at
  vzInTerm:
    filter: vzFilter         # consumer → provider direction
  vzOutTerm:
    filter: vzFilter         # provider → consumer direction
  vzAny:
    imported_contract: vzCPIf
  fvAp:
    monitoring_policy: monEPGPol

  # ── Observability (wave 2) ──────────────────────────────────────────────────
  spanSrcGrp:
    filter_group: spanFilterGrp     # declared under infra — a cross-domain bind
  spanSrc:
    epg: fvEPg                      # abstract — EPG / ESG / external EPG / ...
    bd: fvBD
    vrf: fvCtx
    l3out: l3extOut
    filter_group: spanFilterGrp
    path: fabricPathEp              # fabric-discovered — bind_dn(path=...)
    fabric_node: fabricNode         # fabric-discovered — bind_dn(...)
  spanDest:
    epg: fvEPg                      # abstract
    path: fabricPathEp              # fabric-discovered — bind_dn(path=...)
    apic_node: fabricNode           # ERSPAN to an APIC — bind_dn(...)
  netflowMonitorPol:
    netflow_exporter: netflowExporterPol
    netflow_record: netflowRecordPol
  netflowExporterPol:
    vrf: fvCtx                      # the VRF the collector sits behind
    epg: fvEPg                      # abstract

  # ── L2Out / management (wave 2) ─────────────────────────────────────────────
  l2extOut:
    bd: fvBD
    domain: l2extDomP
  l2extInstP:
    contract_master: fvEPg          # abstract
    imported_contract: vzCPIf
    taboo_contract: vzTaboo
    custom_qos_policy: qosCustomPol
  mgmtInB:
    bd: fvBD                        # the in-band management BD
    contract_master: fvEPg          # abstract
    imported_contract: vzCPIf
    custom_qos_policy: qosCustomPol
    static_node: fabricNode         # fabric-discovered — bind_dn(...)
  mgmtOoB:
    static_node: fabricNode         # fabric-discovered — bind_dn(...)

  fvBD:
    vrf: fvCtx
    l3out: l3extOut
  fvCtx:
    l3out: l3extOut
  l3extOut:
    vrf: fvCtx
    domain: extnwDomP        # abstract — l3_dom / l2_dom
    fallback_route_group: fvFBRGroup
  vzSubj:
    filter: vzFilter

  # ── L3Out (wave 1, 2026-07-12) ──────────────────────────────────────────────
  l3extLNodeP:
    fabric_node: fabricNode
    mpls_custom_qos_policy: qosMplsCustomPol
  l3extLIfP:
    arp_interface_policy: arpIfPol
    nd_interface_policy: ndIfPol
    custom_qos_policy: qosCustomPol
