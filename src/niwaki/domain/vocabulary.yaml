verbs:
  fvAEPg:
    provide:
      rs: fvRsProv
      target: vzBrCP
    consume:
      rs: fvRsCons
      target: vzBrCP
    intra_epg:
      rs: fvRsIntraEpg
      target: vzBrCP
  fvESg:
    provide:
      rs: fvRsProv
      target: vzBrCP
    consume:
      rs: fvRsCons
      target: vzBrCP
    intra_epg:
      rs: fvRsIntraEpg
      target: vzBrCP
  l3extInstP:
    provide:
      rs: fvRsProv
      target: vzBrCP
    consume:
      rs: fvRsCons
      target: vzBrCP
  # vzAny reaches contracts through its own Rs classes, not the EPG ones.
  vzAny:
    provide:
      rs: vzRsAnyToProv
      target: vzBrCP
    consume:
      rs: vzRsAnyToCons
      target: vzBrCP
  l2extInstP:
    provide:
      rs: fvRsProv
      target: vzBrCP
    consume:
      rs: fvRsCons
      target: vzBrCP
    intra_epg:
      rs: fvRsIntraEpg
      target: vzBrCP
  mgmtInB:
    provide:
      rs: fvRsProv
      target: vzBrCP
    consume:
      rs: fvRsCons
      target: vzBrCP
  # The out-of-band world speaks the same two words, over its own Rs classes.
  mgmtOoB:
    provide:
      rs: mgmtRsOoBProv
      target: vzOOBBrCP
  mgmtInstP:
    consume:
      rs: mgmtRsOoBCons
      target: vzOOBBrCP
  # Two relations to the same class (ingress and egress policing): automatic
  # resolution cannot choose, so the verb names the Rs class itself.
  qosRequirement:
    ingress_dpp:
      rs: qosRsIngressDppPol
      target: qosDppPol
    egress_dpp:
      rs: qosRsEgressDppPol
      target: qosDppPol

