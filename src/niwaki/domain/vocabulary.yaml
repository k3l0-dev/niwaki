    default_route_leak_policy: l3extDefaultRouteLeakP
    route_control_profile: rtctrlProfile
    route_target_instrumentation_profile: bgpRtTargetInstrP

    # ── External connectivity labels (wave: 2026-07-15) ───────────────────────
    consumer_label: l3extConsLbl
    provider_label: l3extProvLbl
  l3extLNodeP:
    interface_profile: l3extLIfP
