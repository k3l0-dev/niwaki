# niwaki — weekly canary
#
# The main branch only moves on syncs and releases, so between two of them
# nothing exercises a fresh dependency resolution.  Every Monday this
# workflow re-runs the full CI against today's ecosystem (new ruff, new
# sphinx, new pydantic…), sweeps the external links, validates the declared
# dependency floors, probes the live documentation site, and audits the
# published history for leaked secrets.

name: canary

on:
  schedule:
    - cron: "23 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - run: uv sync --extra dev --extra docs
      - run: uv run sphinx-build -b linkcheck -D linkcheck_retries=2 docs docs/_build/linkcheck

  # The floors declared in pyproject (pydantic>=2.7, httpx>=0.27, …) are
  # never exercised otherwise — install the wheel against the LOWEST
  # allowed direct dependencies and smoke it.
  floor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
      - run: uv build
      - name: Smoke the wheel against the declared floors
        run: |
          uv venv /tmp/floor
          uv pip install --python /tmp/floor/bin/python \
            --resolution lowest-direct dist/niwaki-*.whl
          /tmp/floor/bin/python scripts/wheel_smoke.py

  site-health:
    runs-on: ubuntu-latest
    steps:
      - name: Probe the documentation site
        run: |
          base="https://k3l0-dev.github.io/niwaki"
          for page in "" "cookbook/index.html" "reference/vocabulary/coverage.html" \
                      "comparison.html" "guide/quickstart.html"; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$base/$page")
            echo "$code  $base/$page"
            test "$code" = "200"
          done
          curl -s "$base/" | grep -q "design DSL"   # content probe, not just a 200

  # Audit the full published history for secrets — the last net behind the
  # export gates.  Binary pinned by version AND sha256 (no third-party
  # action, no mutable download).
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Fetch and verify gitleaks
        run: |
          curl -sSLo gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz"
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
      - run: ./gitleaks git --redact --no-banner .
