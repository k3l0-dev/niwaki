# niwaki — CodeQL static analysis
#
# Two languages: `python` scans the SDK sources, `actions` runs the
# workflow-security query pack (complements the fast zizmor lint in ci.yml
# with taint-tracking and the code-scanning UI).  Findings land in the
# Security tab.

name: codeql

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "47 6 * * 3"

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [python, actions]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@f58f0d11ebf5dedd870fab2f999275f7602cfa46 # codeql-bundle-v2.26.0
        with:
          languages: ${{ matrix.language }}
          build-mode: none
      - uses: github/codeql-action/analyze@f58f0d11ebf5dedd870fab2f999275f7602cfa46 # codeql-bundle-v2.26.0
        with:
          category: "/language:${{ matrix.language }}"
