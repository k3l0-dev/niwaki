# niwaki — public CI (GitHub Actions)
#
# The full test suite runs in the maintainers' private infrastructure; this
# pipeline validates what the public deliverable itself guarantees: clean
# lint/types, documentation that builds strictly, a vocabulary book that
# matches the curation, a wheel that installs and works on every supported
# Python, and workflows that pass their own security lint.
#
# Also callable as a reusable workflow (workflow_call) — the weekly canary
# re-runs the exact same gates against a fresh dependency resolution.

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - run: uv sync --extra dev
      - run: uv run ruff format --check src docs scripts
      - run: uv run ruff check src docs scripts
      - run: uv run mypy src

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - run: uv sync --extra dev --extra docs
      # The vocabulary book is generated from the same tables the runtime
      # uses — regeneration must be a no-op.
      - run: uv run python -m niwaki._codegen.generate_docs
      - run: git diff --exit-code -- docs/reference/vocabulary
      - run: uv run sphinx-build -b html -W docs docs/_build/html
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs
          path: docs/_build/html

  package:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13"]
        experimental: [false]
        include:
          # Not yet a supported classifier — observed, never blocking.
          - python: "3.14"
            experimental: true
    continue-on-error: ${{ matrix.experimental }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - run: uv build
      - name: Smoke the wheel in a pristine venv
        run: |
          uv venv --python "$SMOKE_PYTHON" /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python dist/niwaki-*.whl
          /tmp/smoke/bin/python scripts/wheel_smoke.py
        env:
          SMOKE_PYTHON: ${{ matrix.python }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: matrix.python == '3.12'
        with:
          name: dist
          path: dist/

  zizmor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Security-lint the workflows
        run: uvx zizmor --min-severity low .github/workflows/
        env:
          GH_TOKEN: ${{ github.token }}
